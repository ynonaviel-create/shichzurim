<!-- ערכת הנושא נקבעת כאן, לפני הציור הראשון, ולא ב-app.js — אחרת המסך מהבהב
     לבן לרגע לפני שהוא נהיה כהה, וזו בדיוק ההבהקה שמכאיבה בלילה. הלוגיקה
     מוכפלת ב-initTheme (app.js), והכפילות מכוונת: אין דרך לקרוא קובץ חיצוני
     בלי לשלם בהבהוב. שלושה מצבים: auto (לפי המכשיר) / light / dark. בחירה
     מפורשת נשמרת וגוברת; auto (ברירת מחדל) עוקב אחרי הגדרות המכשיר. -->
<script>
  (function () {
    try {
      var saved = localStorage.getItem('shichzurim.theme');
      var mode = (saved === 'light' || saved === 'dark' || saved === 'auto') ? saved : 'auto';
      var dark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
      var resolved = mode === 'auto' ? (dark ? 'dark' : 'light') : mode;
      document.documentElement.setAttribute('data-theme', resolved);
      document.documentElement.setAttribute('data-theme-mode', mode);
    } catch (e) { /* אחסון חסום — נשארים עם ברירת המחדל שבתגית */ }
  })();
</script>
